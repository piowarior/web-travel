<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Jost:ital,wght@0,100..900;1,100..900&family=Liter&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/validasi.css">
    <title>Validasi</title>
</head>
<body>
    <div class="hero">

        <main>
            <div class="utama">
                <div class="utama_main">
                    <h1>HELLO ! <span>You need an account to continue</span></h1>
                    <form action="" class="kirim">
                        <input type="text" id="text" placeholder="Full Name">
                        <span id="text_w" class="inputan"></span>
                        <input type="email" id="email" placeholder="Email">
                        <span id="email_w" class="inputan"></span>
                        <input type="password" id="password" placeholder="Password">
                        <span id="password_w" class="inputan"></span>
                        <input type="checkbox" class="cekbox" >
                        <!-- <label for="cekbox">I agree to the terms and conditions</label> -->
                        <div class="tombol">
                            <button class="submit" id="submit">SUBMIT</button>
                        </div>
                            <div class="login-container">
                                <div class="separator">or</div>
                                <button class="login-button google">
                                    <img src="https://www.google.com/favicon.ico" alt="Google logo">
                                    Sign up with Google
                                </button>
                                <button class="login-button linkedin">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/ca/LinkedIn_logo_initials.png" alt="LinkedIn logo">
                                    Sign up with LinkedIn
                                </button>
                            </div>
                    </form>
                </div>
            </div>
            <div class="side_utama"></div>
        </main>

    </div>

    <script src="/js/script.js"></script>
</body>
</html>
